<svg width="1100" height="620" viewBox="0 0 1100 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark comparison between Current Repo and New Repo</title>
  <desc id="desc">Grouped bar chart showing benchmark times converted to milliseconds for Current Repo and New Repo across install, build, backend task test, frontend dummy test, backend refresh, and frontend HMR.</desc>

  <rect width="1100" height="620" fill="white"/>

  <rect x="780" y="22" width="14" height="14" rx="2" fill="#94A3B8"/>
  <text x="802" y="34" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">Current Repo</text>
  <rect x="915" y="22" width="14" height="14" rx="2" fill="#2563EB"/>
  <text x="937" y="34" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">New Repo</text>

  <line x1="80" y1="500" x2="1030" y2="500" stroke="#111827" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="80" y2="500" stroke="#111827" stroke-width="1.5"/>

  <line x1="80" y1="500" x2="1030" y2="500" stroke="#E5E7EB"/>
  <line x1="80" y1="390" x2="1030" y2="390" stroke="#E5E7EB"/>
  <line x1="80" y1="280" x2="1030" y2="280" stroke="#E5E7EB"/>
  <line x1="80" y1="170" x2="1030" y2="170" stroke="#E5E7EB"/>
  <line x1="80" y1="60" x2="1030" y2="60" stroke="#E5E7EB"/>

  <text x="68" y="504" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">0</text>
  <text x="68" y="394" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">20,000</text>
  <text x="68" y="284" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">40,000</text>
  <text x="68" y="174" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">60,000</text>
  <text x="68" y="64" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">80,000</text>
  <text x="28" y="285" transform="rotate(-90 28 285)" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Time (ms)</text>

  <rect x="140" y="126" width="28" height="374" rx="3" fill="#94A3B8"/>
  <rect x="178" y="395.5" width="28" height="104.5" rx="3" fill="#2563EB"/>

  <rect x="280" y="406.5" width="28" height="93.5" rx="3" fill="#94A3B8"/>
  <rect x="318" y="469.75" width="28" height="30.25" rx="3" fill="#2563EB"/>

  <rect x="420" y="487.35" width="28" height="12.65" rx="3" fill="#94A3B8"/>
  <rect x="458" y="488.78" width="28" height="11.22" rx="3" fill="#2563EB"/>

  <rect x="560" y="495.27" width="28" height="4.73" rx="3" fill="#94A3B8"/>
  <rect x="598" y="496.21" width="28" height="3.79" rx="3" fill="#2563EB"/>

  <rect x="700" y="483.02" width="28" height="16.98" rx="3" fill="#94A3B8"/>
  <rect x="738" y="498.48" width="28" height="1.52" rx="3" fill="#2563EB"/>

  <rect x="840" y="497.42" width="28" height="2.58" rx="3" fill="#94A3B8"/>
  <rect x="878" y="499.93" width="28" height="0.07" rx="3" fill="#2563EB"/>

  <text x="173" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">
    <tspan x="173" dy="0">Cold</tspan>
    <tspan x="173" dy="14">install</tspan>
  </text>
  <text x="313" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">
    <tspan x="313" dy="0">Cold</tspan>
    <tspan x="313" dy="14">build</tspan>
  </text>
  <text x="453" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">
    <tspan x="453" dy="0">Backend</tspan>
    <tspan x="453" dy="14">tests</tspan>
  </text>
  <text x="593" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">
    <tspan x="593" dy="0">Frontend</tspan>
    <tspan x="593" dy="14">tests</tspan>
  </text>
  <text x="733" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">
    <tspan x="733" dy="0">Backend</tspan>
    <tspan x="733" dy="14">refresh</tspan>
  </text>
  <text x="873" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">
    <tspan x="873" dy="0">Frontend</tspan>
    <tspan x="873" dy="14">HMR</tspan>
  </text>

  <text x="173" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">68s vs 19s</text>
  <text x="313" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">17s vs 5.5s</text>
  <text x="453" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">2.3s vs 2.04s</text>
  <text x="593" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">0.86s vs 0.69s</text>
  <text x="733" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">3088ms vs 277ms</text>
  <text x="873" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">469ms vs 13ms</text>
</svg>
