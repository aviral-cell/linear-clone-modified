version: 1.0
configuration:
    has_webserver: true
    readonly_paths:
        - backend/test/*
        - backend/src/config/database.js
        - backend/src/utils/seeders/*
        - backend/src/utils/seed.js
        - setup.sh
    ide_config:
        default_open_files:
            - backend/src/app.js
            - frontend/src/App.js
        project_menu:
            run: bun run start
            install: bun run setup
            test: bun run test
